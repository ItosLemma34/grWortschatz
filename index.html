<!DOCTYPE HTML>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gereon-Rath-Krimis: Wortschatz</title>
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>

        <div class="main-header">
            <span class="return">
                <a href="help.html" onclick="saveCurrentWord()">Help/Info</a>
            </span>
            <h3>Gereon-Rath-Krimis: Wortschatz</h3>
            <span class="return">
                <a href="personen.html" onclick="saveCurrentWord()">Personen</a>
            </span>
        </div>

    </header>

    <main class="main-container">

        <div class="selection-container">
            <button id="randomSelectButton"><strong>Random Word/Phrase</strong></button>
            <br>
            <label for="find-as-you-type" class="sizeOfLabels"><strong>Enter Word/Phrase:</strong></label>
            <input id="find-as-you-type" autocomplete="off">
            <br>
            <label for="wordDropdown" class="sizeOfLabels"><strong>or Click on Word/Phrase:</strong></label>
            <select id="wordDropdown" class="sizeOfLabels" size="25"></select>
        </div>

         <div id="main-container">
         </div>
    </main>

    <script src="script.js" type="module"></script>
    <script>
        "use strict";
        function saveCurrentWord() {
            const currentWord = document.getElementById('wordDropdown').value;
            sessionStorage.setItem('returnWord', currentWord);
        }
    </script>
</body>
</html>
